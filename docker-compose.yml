version: "3.9"

services:
  drug-pipeline:
    build: .
    container_name: drug-pipeline-mcp
    ports:
      - "8081:8081"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
